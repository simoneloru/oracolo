name: Publish to NPM

on:
  push:
    tags:
      - 'v*' # Si attiva automaticamente ogni volta che crei un tag (es. v1.0.1)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Publish to NPM
        run: npm publish --access public
